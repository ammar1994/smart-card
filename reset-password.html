<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تعيين كلمة مرور جديدة - البطاقة الذكية</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .box {
    background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
    border: 1px solid #d4af37;
    border-radius: 20px;
    padding: 40px 30px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 30px rgba(212,175,55,0.2);
  }
  h1 {
    color: #d4af37;
    font-size: 22px;
    text-align: center;
    margin-bottom: 10px;
  }
  .subtitle {
    color: #888;
    font-size: 13px;
    text-align: center;
    margin-bottom: 28px;
  }
  label {
    color: #ccc;
    font-size: 13px;
    display: block;
    margin-bottom: 6px;
  }
  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  input[type="password"], input[type="text"] {
    width: 100%;
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 12px 42px 12px 15px;
    color: #fff;
    font-size: 14px;
    outline: none;
  }
  input:focus { border-color: #d4af37; }
  .toggle-eye {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #666;
    font-size: 16px;
    padding: 0;
    width: auto;
  }
  .toggle-eye:hover { color: #d4af37; }

  /* مؤشر قوة كلمة المرور */
  .strength-bar {
    height: 4px;
    border-radius: 2px;
    background: #222;
    margin-top: -10px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
    width: 0%;
  }
  .strength-text {
    font-size: 11px;
    margin-bottom: 12px;
    min-height: 14px;
  }

  button[type="submit"] {
    width: 100%;
    background: #d4af37;
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
  }
  button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg {
    text-align: center;
    font-size: 13px;
    margin-top: 15px;
    min-height: 18px;
  }
  .msg.error { color: #ff5555; }
  .msg.success { color: #5dd879; }

  /* Invalid link state */
  .invalid-box {
    display: none;
    text-align: center;
  }
  .invalid-box .icon { font-size: 44px; margin-bottom: 14px; }
  .invalid-box h2 { color: #ff8585; font-size: 18px; margin-bottom: 10px; }
  .invalid-box p { color: #aaa; font-size: 13px; line-height: 1.7; }
  .invalid-box a {
    display: inline-block;
    margin-top: 20px;
    color: #d4af37;
    font-size: 13px;
    text-decoration: none;
  }

  /* Success state */
  .success-box {
    display: none;
    text-align: center;
  }
  .success-box .icon { font-size: 48px; margin-bottom: 16px; }
  .success-box h2 { color: #5dd879; font-size: 18px; margin-bottom: 10px; }
  .success-box p { color: #aaa; font-size: 13px; }
  .success-box a {
    display: inline-block;
    margin-top: 24px;
    background: #d4af37;
    color: #000;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: bold;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="box">

  <!-- فورم كلمة المرور الجديدة -->
  <div id="formSection" style="display:none">
    <h1>كلمة مرور جديدة</h1>
    <p class="subtitle">اختر كلمة مرور قوية لحسابك</p>
    <form id="resetForm">
      <label>كلمة المرور الجديدة</label>
      <div class="input-wrap">
        <input type="password" id="password" required placeholder="8 أحرف على الأقل" minlength="8">
        <button type="button" class="toggle-eye" onclick="togglePass('password', this)">👁</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-text" id="strengthText"></div>

      <label>تأكيد كلمة المرور</label>
      <div class="input-wrap">
        <input type="password" id="confirmPassword" required placeholder="أعد كتابة كلمة المرور">
        <button type="button" class="toggle-eye" onclick="togglePass('confirmPassword', this)">👁</button>
      </div>

      <button type="submit" id="submitBtn">تعيين كلمة المرور</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>

  <!-- رابط منتهي أو غير صالح -->
  <div class="invalid-box" id="invalidSection">
    <div class="icon">⚠️</div>
    <h2>الرابط غير صالح</h2>
    <p>هذا الرابط منتهي الصلاحية أو استُخدم من قبل.<br>يرجى طلب رابط جديد.</p>
    <a href="forgot-password.html">طلب رابط جديد</a>
  </div>

  <!-- نجاح -->
  <div class="success-box" id="successSection">
    <div class="icon">🔐</div>
    <h2>تم التغيير بنجاح!</h2>
    <p>يمكنك الآن تسجيل الدخول بكلمة مرورك الجديدة.</p>
    <a href="login.html">تسجيل الدخول</a>
  </div>

</div>

<script src="supabase-config.js"></script>
<script>
// ===== استخراج التوكن من الـ URL =====
// Supabase يرسل الـ token في الـ hash أو query params
async function initPage() {
  // محاولة استخراج الجلسة من الـ URL (Supabase يضعها في hash)
  const { data, error } = await supabaseClient.auth.getSession();

  // تحقق من وجود access_token في الـ hash (PKCE flow)
  const hash = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', '?').slice(1));
  const accessToken = params.get('access_token');
  const type = params.get('type');

  if (accessToken && type === 'recovery') {
    // تعيين الجلسة يدوياً
    const { error: sessionError } = await supabaseClient.auth.setSession({
      access_token: accessToken,
      refresh_token: params.get('refresh_token') || ''
    });

    if (sessionError) {
      showInvalid();
      return;
    }
    showForm();
    return;
  }

  // لو في جلسة نشطة من نوع recovery
  if (data.session) {
    showForm();
    return;
  }

  showInvalid();
}

function showForm() {
  document.getElementById('formSection').style.display = 'block';
}
function showInvalid() {
  document.getElementById('invalidSection').style.display = 'block';
}

// ===== إظهار/إخفاء كلمة المرور =====
function togglePass(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

// ===== مؤشر قوة كلمة المرور =====
document.getElementById('password').addEventListener('input', function() {
  const val = this.value;
  const fill = document.getElementById('strengthFill');
  const text = document.getElementById('strengthText');

  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;

  const levels = [
    { pct: '0%',   color: '#333',    label: '' },
    { pct: '25%',  color: '#ff5555', label: '🔴 ضعيفة' },
    { pct: '50%',  color: '#f0a500', label: '🟡 متوسطة' },
    { pct: '75%',  color: '#5dd879', label: '🟢 جيدة' },
    { pct: '100%', color: '#00c853', label: '✅ قوية جداً' },
  ];

  const lvl = val.length === 0 ? levels[0] : levels[score] || levels[1];
  fill.style.width = lvl.pct;
  fill.style.background = lvl.color;
  text.textContent = lvl.label;
  text.style.color = lvl.color;
});

// ===== إرسال الفورم =====
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const msg = document.getElementById('msg');
  msg.textContent = '';
  msg.className = 'msg';

  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirmPassword').value;

  if (password !== confirm) {
    msg.textContent = 'كلمتا المرور غير متطابقتين';
    msg.classList.add('error');
    return;
  }

  const submitBtn = document.getElementById('submitBtn');
  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري الحفظ...';

  const { error } = await supabaseClient.auth.updateUser({ password });

  submitBtn.disabled = false;
  submitBtn.textContent = 'تعيين كلمة المرور';

  if (error) {
    msg.textContent = 'خطأ: ' + error.message;
    msg.classList.add('error');
    return;
  }

  // تسجيل خروج بعد التغيير (أمان)
  await supabaseClient.auth.signOut();

  document.getElementById('formSection').style.display = 'none';
  document.getElementById('successSection').style.display = 'block';
});

// ===== تشغيل الصفحة =====
initPage();
</script>
</body>
</html>
