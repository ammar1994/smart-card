<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>البطاقة الذكية</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .box {
    background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
    border: 1px solid #d4af37;
    border-radius: 20px;
    padding: 45px 30px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 30px rgba(212,175,55,0.2);
  }
  .logo { font-size: 50px; margin-bottom: 15px; }
  h1 { color: #d4af37; font-size: 24px; margin-bottom: 10px; }
  p { color: #888; font-size: 14px; margin-bottom: 30px; line-height: 1.6; }
  a.btn {
    display: block;
    text-decoration: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: bold;
    margin-bottom: 12px;
  }
  .primary { background: #d4af37; color: #000; }
  .secondary { background: transparent; border: 1px solid #444; color: #ccc; }
  .secondary:hover { border-color: #d4af37; color: #d4af37; }
</style>
</head>
<body>
<div class="box">
  <div class="logo">💳</div>
  <h1>البطاقة الذكية</h1>
  <p>أنشئ بطاقتك الرقمية الشخصية، وشاركها عبر NFC أو رابط مباشر، وعدّلها في أي وقت بدون أي كود.</p>
  <a class="btn primary" href="signup.html">إنشاء حساب جديد</a>
  <a class="btn secondary" href="login.html">تسجيل الدخول</a>
</div>
</body>
</html>
