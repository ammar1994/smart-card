<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>البطاقة الذكية</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
    border: 1px solid #d4af37;
    border-radius: 20px;
    padding: 40px 30px;
    width: 90%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 30px rgba(212,175,55,0.2);
  }
  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid #d4af37;
    margin: 0 auto 20px;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }
  .name {
    color: #d4af37;
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 5px;
  }
  .job {
    color: #888;
    font-size: 14px;
    margin-bottom: 25px;
  }
  .info-item {
    display: flex;
    align-items: center;
    background: #111;
    border-radius: 10px;
    padding: 12px 15px;
    margin-bottom: 10px;
    text-decoration: none;
    color: #fff;
    border: 1px solid #222;
  }
  .info-item:hover { border-color: #d4af37; }
  .info-icon { font-size: 20px; margin-left: 10px; }
  .info-text { font-size: 14px; color: #ccc; }
  .social {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
  }
  .social a {
    background: #111;
    border: 1px solid #333;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    text-decoration: none;
  }
  .social a:hover { border-color: #d4af37; }
</style>
</head>
<body>
<div class="card">
  <div class="avatar">👤</div>
  <div class="name">محمد أحمد</div>
  <div class="job">مطور ويب | مصمم جرافيك</div>

  <a class="info-item" href="tel:+966500000000">
    <span class="info-icon">📞</span>
    <span class="info-text">+966 500 000 000</span>
  </a>

  <a class="info-item" href="mailto:email@example.com">
    <span class="info-icon">📧</span>
    <span class="info-text">email@example.com</span>
  </a>

  <a class="info-item" href="#">
    <span class="info-icon">📍</span>
    <span class="info-text">الرياض، المملكة العربية السعودية</span>
  </a>

  <div class="social">
    <a href="#">📘</a>
    <a href="#">📸</a>
    <a href="#">💼</a>
    <a href="#">🐦</a>
  </div>
</div>
</body>
</html>
