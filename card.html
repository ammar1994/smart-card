<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>البطاقة الذكية</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
    border: 1px solid var(--theme, #d4af37);
    border-radius: 20px;
    padding: 40px 30px;
    width: 100%;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 30px rgba(212,175,55,0.2);
  }
  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid var(--theme, #d4af37);
    margin: 0 auto 20px;
    background: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .name {
    color: var(--theme, #d4af37);
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 5px;
  }
  .job {
    color: #888;
    font-size: 14px;
    margin-bottom: 25px;
  }
  .info-item {
    display: flex;
    align-items: center;
    background: #111;
    border-radius: 10px;
    padding: 12px 15px;
    margin-bottom: 10px;
    text-decoration: none;
    color: #fff;
    border: 1px solid #222;
  }
  .info-item:hover { border-color: var(--theme, #d4af37); }
  .info-icon { font-size: 20px; margin-left: 10px; }
  .info-text { font-size: 14px; color: #ccc; }
  .social {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-top: 20px;
  }
  .social a {
    background: #111;
    border: 1px solid #333;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
  }
  .social a:hover { border-color: var(--theme, #d4af37); }
  .social img { width: 22px; height: 22px; }
  .state-box {
    color: #888;
    text-align: center;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="content" class="state-box">جاري التحميل...</div>

<script src="supabase-config.js"></script>
<script>
function getSlugFromUrl() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('slug')) return params.get('slug');

  const path = window.location.pathname;
  const match = path.match(/\/u\/([^/]+)/);
  if (match) return decodeURIComponent(match[1]);

  return null;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

// أيقونات حقيقية (SVG) من مكتبة Simple Icons عبر CDN
const SOCIAL_ICONS = {
  facebook:  'https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/facebook.svg',
  instagram: 'https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/instagram.svg',
  linkedin:  'https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/linkedin.svg',
  twitter:   'https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/x.svg',
  whatsapp:  'https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/whatsapp.svg',
};

function renderCard(card) {
  const theme = card.theme_color || '#d4af37';

  let html = `<div class="card" style="--theme: ${escapeHtml(theme)}">`;

  html += card.avatar_url
    ? `<div class="avatar"><img src="${escapeHtml(card.avatar_url)}" alt=""></div>`
    : `<div class="avatar">👤</div>`;

  html += `<div class="name">${escapeHtml(card.full_name) || 'بدون اسم'}</div>`;
  if (card.job_title) html += `<div class="job">${escapeHtml(card.job_title)}</div>`;
  else html += `<div class="job">&nbsp;</div>`;

  if (card.phone) {
    html += `<a class="info-item" href="tel:${escapeHtml(card.phone)}">
      <span class="info-icon">📞</span><span class="info-text">${escapeHtml(card.phone)}</span>
    </a>`;
  }
  if (card.whatsapp) {
    const wa = card.whatsapp.replace(/[^0-9+]/g, '');
    html += `<a class="info-item" href="https://wa.me/${escapeHtml(wa.replace('+',''))}" target="_blank">
      <img class="info-icon" style="width:20px;height:20px;filter:invert(1);" src="${SOCIAL_ICONS.whatsapp}" alt="">
      <span class="info-text">واتساب: ${escapeHtml(card.whatsapp)}</span>
    </a>`;
  }
  if (card.email) {
    html += `<a class="info-item" href="mailto:${escapeHtml(card.email)}">
      <span class="info-icon">📧</span><span class="info-text">${escapeHtml(card.email)}</span>
    </a>`;
  }
  if (card.location) {
    html += `<a class="info-item" href="#">
      <span class="info-icon">📍</span><span class="info-text">${escapeHtml(card.location)}</span>
    </a>`;
  }

  // روابط السوشيال ميديا - تظهر فقط لو الرابط مكتوب فعليًا
  const socials = [
    { url: card.facebook_url,  icon: SOCIAL_ICONS.facebook },
    { url: card.instagram_url, icon: SOCIAL_ICONS.instagram },
    { url: card.linkedin_url,  icon: SOCIAL_ICONS.linkedin },
    { url: card.twitter_url,   icon: SOCIAL_ICONS.twitter },
  ].filter(s => s.url && s.url.trim() !== '');

  if (socials.length) {
    html += `<div class="social">`;
    socials.forEach(s => {
      html += `<a href="${escapeHtml(s.url)}" target="_blank">
        <img src="${s.icon}" alt="" style="filter:invert(1);">
      </a>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  document.getElementById('content').outerHTML = html;
}

(async () => {
  const slug = getSlugFromUrl();
  const contentBox = document.getElementById('content');

  if (!slug) {
    contentBox.textContent = 'رابط غير صالح. لا يوجد معرف بطاقة.';
    return;
  }

  const { data, error } = await supabaseClient
    .from('cards')
    .select('*')
    .eq('slug', slug)
    .eq('is_active', true)
    .single();

  if (error || !data) {
    contentBox.textContent = 'البطاقة غير موجودة أو غير منشورة.';
    return;
  }

  renderCard(data);
})();
</script>
</body>
</html>
