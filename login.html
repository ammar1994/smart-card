<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - البطاقة الذكية</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold:       #C9A84C;
    --gold-light: #E2C46A;
    --gold-dark:  #8A6A28;
    --bg:         #0C0C0C;
    --card:       #141414;
    --border:     #252525;
    --text:       #EDEAE4;
    --muted:      #6B6560;
    --input-bg:   #0F0F0F;
    --radius:     12px;
  }

  body {
    font-family: 'IBM Plex Sans Arabic', 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 45% at 50% -5%, rgba(201,168,76,.15) 0%, transparent 65%),
      radial-gradient(ellipse 50% 35% at 85% 105%, rgba(201,168,76,.07) 0%, transparent 55%);
    pointer-events: none;
  }

  /* ── Card ── */
  .box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 44px 32px 38px;
    width: 100%;
    max-width: 400px;
    position: relative;
    overflow: hidden;
  }

  .box::before {
    content: '';
    position: absolute;
    top: 0; left: 15%; right: 15%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  /* ── Header ── */
  .card-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .logo-mark {
    width: 52px;
    height: 52px;
    margin: 0 auto 16px;
    background: #181818;
    border: 1px solid var(--gold-dark);
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark svg { width: 28px; height: 28px; }

  h1 {
    color: var(--text);
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 3px;
  }

  .card-sub {
    font-size: 12px;
    color: var(--muted);
    font-weight: 400;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 0 26px;
  }

  /* ── Form ── */
  label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: .5px;
    display: block;
    margin-bottom: 7px;
  }

  input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 15px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    direction: ltr;
    text-align: right;
  }

  input::placeholder { color: #333; }

  input:focus {
    border-color: var(--gold-dark);
    box-shadow: 0 0 0 3px rgba(201,168,76,.07);
  }

  /* ── Forgot ── */
  .forgot {
    text-align: left;
    margin-top: -10px;
    margin-bottom: 22px;
    font-size: 12px;
  }

  .forgot a {
    color: var(--muted);
    text-decoration: none;
    transition: color .15s;
  }

  .forgot a:hover { color: var(--gold); }

  /* ── Button ── */
  button {
    width: 100%;
    background: linear-gradient(135deg, var(--gold) 0%, #B08A2A 100%);
    color: #0C0C0C;
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 4px;
    transition: opacity .2s, transform .15s;
    letter-spacing: .2px;
  }

  button:hover { opacity: .9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* ── Messages ── */
  .msg {
    text-align: center;
    font-size: 13px;
    margin-top: 14px;
    min-height: 18px;
    font-weight: 500;
  }
  .msg.error   { color: #F06060; }
  .msg.success { color: #6DD47E; }

  /* ── Switch link ── */
  .switch {
    text-align: center;
    margin-top: 22px;
    font-size: 13px;
    color: var(--muted);
  }

  .switch a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 600;
  }
  .switch a:hover { color: var(--gold-light); }
</style>
</head>
<body>
<div class="box">

  <div class="card-header">
    <div class="logo-mark">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="6" width="24" height="16" rx="3" stroke="#C9A84C" stroke-width="1.4"/>
        <rect x="2" y="11" width="24" height="3.5" fill="#C9A84C" opacity=".2"/>
        <rect x="5" y="17" width="6" height="2" rx="1" fill="#C9A84C" opacity=".55"/>
        <circle cx="20" cy="18" r="1.8" stroke="#C9A84C" stroke-width="1.1"/>
        <circle cx="23" cy="18" r="1.8" stroke="#C9A84C" stroke-width="1.1" opacity=".45"/>
      </svg>
    </div>
    <h1>تسجيل الدخول</h1>
    <span class="card-sub">البطاقة الذكية · Smart Card</span>
  </div>

  <div class="divider"></div>

  <form id="loginForm">
    <label>البريد الإلكتروني</label>
    <input type="email" id="email" required placeholder="example@email.com">

    <label>كلمة المرور</label>
    <input type="password" id="password" required placeholder="••••••••">

    <div class="forgot">
      <a href="forgot-password.html">نسيت كلمة المرور؟</a>
    </div>

    <button type="submit" id="submitBtn">دخول</button>
  </form>

  <div class="msg" id="msg"></div>
  <div class="switch">ما عندك حساب؟ <a href="signup.html">إنشاء حساب جديد</a></div>

</div>

<script src="supabase-config.js"></script>
<script>
const form = document.getElementById('loginForm');
const msg = document.getElementById('msg');
const submitBtn = document.getElementById('submitBtn');

(async () => {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) window.location.href = 'dashboard.html';
})();

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = '';
  msg.className = 'msg';
  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري الدخول...';

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  submitBtn.disabled = false;
  submitBtn.textContent = 'دخول';

  if (error) {
    msg.textContent = 'خطأ: ' + error.message;
    msg.classList.add('error');
    return;
  }

  msg.textContent = 'تم الدخول بنجاح! يتم تحويلك...';
  msg.classList.add('success');
  setTimeout(() => window.location.href = 'dashboard.html', 800);
});
</script>
</body>
</html>
