<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نسيت كلمة المرور - البطاقة الذكية</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .box {
    background: linear-gradient(145deg, #1a1a1a, #2a2a2a);
    border: 1px solid #d4af37;
    border-radius: 20px;
    padding: 40px 30px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 0 30px rgba(212,175,55,0.2);
  }
  h1 {
    color: #d4af37;
    font-size: 22px;
    text-align: center;
    margin-bottom: 10px;
  }
  .subtitle {
    color: #888;
    font-size: 13px;
    text-align: center;
    margin-bottom: 28px;
    line-height: 1.6;
  }
  label {
    color: #ccc;
    font-size: 13px;
    display: block;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 12px 15px;
    color: #fff;
    font-size: 14px;
    margin-bottom: 16px;
    outline: none;
  }
  input:focus { border-color: #d4af37; }
  button {
    width: 100%;
    background: #d4af37;
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
  }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .msg {
    text-align: center;
    font-size: 13px;
    margin-top: 15px;
    min-height: 18px;
    line-height: 1.5;
  }
  .msg.error { color: #ff5555; }
  .msg.success { color: #5dd879; }
  .switch {
    text-align: center;
    margin-top: 22px;
    font-size: 13px;
    color: #888;
  }
  .switch a { color: #d4af37; text-decoration: none; }

  /* Success state */
  .success-box {
    display: none;
    text-align: center;
  }
  .success-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  .success-box h2 { color: #5dd879; font-size: 18px; margin-bottom: 10px; }
  .success-box p { color: #aaa; font-size: 13px; line-height: 1.7; }
  .success-box .back-btn {
    display: inline-block;
    margin-top: 24px;
    background: #d4af37;
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    width: auto;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="box">

  <!-- فورم الإيميل -->
  <div id="formSection">
    <h1>نسيت كلمة المرور؟</h1>
    <p class="subtitle">أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور</p>
    <form id="forgotForm">
      <label>البريد الإلكتروني</label>
      <input type="email" id="email" required placeholder="example@email.com">
      <button type="submit" id="submitBtn">إرسال رابط الاسترداد</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="switch"><a href="login.html">← العودة لتسجيل الدخول</a></div>
  </div>

  <!-- رسالة النجاح -->
  <div class="success-box" id="successSection">
    <div class="success-icon">📬</div>
    <h2>تم الإرسال!</h2>
    <p>تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني.<br>تحقق من صندوق الوارد (أو Spam).</p>
    <a href="login.html" class="back-btn">العودة لتسجيل الدخول</a>
  </div>

</div>

<script src="supabase-config.js"></script>
<script>
const form = document.getElementById('forgotForm');
const msg = document.getElementById('msg');
const submitBtn = document.getElementById('submitBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = '';
  msg.className = 'msg';
  submitBtn.disabled = true;
  submitBtn.textContent = 'جاري الإرسال...';

  const email = document.getElementById('email').value.trim();

  const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://smart-card-nine.vercel.app/reset-password.html'
  });

  submitBtn.disabled = false;
  submitBtn.textContent = 'إرسال رابط الاسترداد';

  if (error) {
    msg.textContent = 'خطأ: ' + error.message;
    msg.classList.add('error');
    return;
  }

  // إظهار رسالة النجاح وإخفاء الفورم
  document.getElementById('formSection').style.display = 'none';
  document.getElementById('successSection').style.display = 'block';
});
</script>
</body>
</html>
